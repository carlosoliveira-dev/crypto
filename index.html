<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Crypto</title>
  </head>
  <body>
    <p>Cadastro de Criptomoedas</p>

    <form id="formulario">
    <div class="form-group">
    <label for="exampleInputEmail1">Nome</label>
    <input type="text" name="nome" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
    </div>
    <div class="form-group">
    <label for="exampleInputPassword1">Contrato</label>
    <input type="text" name="contrato" class="form-control" id="exampleInputPassword1" required>
    </div>
    
    <select id="corretora" class="form-select" aria-label="Default select example">
    <option value="" disabled selected>Selecione a Corretora</option>
    <option value="1">Binance</option>
    <option value="2">Gate.io</option>
    <option value="3">MetaMask</option>
    </select>
    
    <button type="submit" class="btn btn-primary">Cadastrar</button>
    </form>

    <button id="button_lista">Listar Moedas</button>
    <div id="div_lista"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <script type="module" src="/src/client/main.js"></script>
  </body>
</html>
